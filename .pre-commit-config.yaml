# ── Pre-commit hooks — run automatically on every `git commit` ─────────────────
# Install once:  pip install pre-commit && pre-commit install
# Manual run:    pre-commit run --all-files

repos:
  # ── Secrets / credential detection ────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: >
          (?x)^(
            \.env\.example|
            \.env\.new|
            .*\.bat|
            .*\.ps1
          )$

  # ── General file hygiene ───────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: "launcher\\.ico"
      - id: trailing-whitespace
        exclude: "launcher\\.ico"
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]

  # ── Python linting + formatting (ruff) ────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ── Python SAST (bandit) ───────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "--severity-level", "medium"]
        files: "^backend/(?!tests/).*\\.py$"

  # ── Backend unit tests ────────────────────────────────────────────────────────
  # Runs on any change to backend Python files or test files.
  # Uses the project .venv — run `pre-commit install` while the venv is active,
  # or set PYTEST_PYTHON to point to your venv python.exe explicitly.
  - repo: local
    hooks:
      - id: pytest-backend
        name: pytest (backend)
        entry: python -m pytest backend/tests/ -x -q --tb=short -m "not slow and not integration"
        language: system
        pass_filenames: false
        types: [python]
        files: "^backend/"
